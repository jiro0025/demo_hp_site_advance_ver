<svg xmlns="http://www.w3.org/2000/svg" width="800" height="450" viewBox="0 0 800 450">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e1b4b;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#7c3aed;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0d9488;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="800" height="450" fill="url(#bg)"/>
  <!-- Decorative grid lines -->
  <line x1="0" y1="225" x2="800" y2="225" stroke="#334155" stroke-width="0.5"/>
  <line x1="400" y1="0" x2="400" y2="450" stroke="#334155" stroke-width="0.5"/>
  <!-- Center icon area -->
  <circle cx="400" cy="185" r="60" fill="none" stroke="url(#accent)" stroke-width="2" opacity="0.6"/>
  <circle cx="400" cy="185" r="45" fill="#1e1b4b"/>
  <!-- Skill icon: lightning bolt -->
  <path d="M410 155 L392 188 L405 188 L390 218 L418 180 L404 180 Z" fill="url(#accent)"/>
  <!-- Labels -->
  <text x="400" y="280" font-family="sans-serif" font-size="18" font-weight="700" fill="#e2e8f0" text-anchor="middle">Claude Code Skill</text>
  <text x="400" y="305" font-family="sans-serif" font-size="13" fill="#94a3b8" text-anchor="middle">繰り返し作業をワンコマンドで標準化</text>
  <!-- Command example -->
  <rect x="240" y="330" width="320" height="36" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="400" y="354" font-family="'Courier New', monospace" font-size="13" fill="#7c3aed" text-anchor="middle">/ skill-name [argument]</text>
  <!-- Tags -->
  <rect x="280" y="385" width="80" height="24" rx="4" fill="#312e81" opacity="0.8"/>
  <text x="320" y="401" font-family="sans-serif" font-size="11" fill="#a5b4fc" text-anchor="middle">Claude Skill</text>
  <rect x="370" y="385" width="50" height="24" rx="4" fill="#134e4a" opacity="0.8"/>
  <text x="395" y="401" font-family="sans-serif" font-size="11" fill="#5eead4" text-anchor="middle">OSS</text>
  <rect x="430" y="385" width="90" height="24" rx="4" fill="#1e3a5f" opacity="0.8"/>
  <text x="475" y="401" font-family="sans-serif" font-size="11" fill="#93c5fd" text-anchor="middle">プロンプト設計</text>
</svg>
