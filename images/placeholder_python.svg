<svg xmlns="http://www.w3.org/2000/svg" width="800" height="450" viewBox="0 0 800 450">
  <rect width="800" height="450" fill="#1a1a2e"/>
  <!-- Terminal window chrome -->
  <rect x="40" y="40" width="720" height="370" rx="10" fill="#16213e" stroke="#0f3460" stroke-width="1.5"/>
  <rect x="40" y="40" width="720" height="38" rx="10" fill="#0f3460"/>
  <rect x="40" y="64" width="720" height="14" fill="#0f3460"/>
  <circle cx="70" cy="59" r="7" fill="#ff5f57"/>
  <circle cx="94" cy="59" r="7" fill="#febc2e"/>
  <circle cx="118" cy="59" r="7" fill="#28c840"/>
  <!-- Terminal text -->
  <text x="68" y="114" font-family="'Courier New', monospace" font-size="13" fill="#4ade80">$</text>
  <text x="84" y="114" font-family="'Courier New', monospace" font-size="13" fill="#e2e8f0"> python3 main.py --input data.csv</text>
  <text x="68" y="140" font-family="'Courier New', monospace" font-size="13" fill="#94a3b8">  Loading data...</text>
  <text x="68" y="162" font-family="'Courier New', monospace" font-size="13" fill="#94a3b8">  Processing 1,247 rows</text>
  <text x="68" y="184" font-family="'Courier New', monospace" font-size="13" fill="#4ade80">  ✓ Done in 2.3s</text>
  <text x="68" y="214" font-family="'Courier New', monospace" font-size="13" fill="#4ade80">$</text>
  <text x="84" y="214" font-family="'Courier New', monospace" font-size="13" fill="#e2e8f0"> python3 main.py --export output.csv</text>
  <text x="68" y="240" font-family="'Courier New', monospace" font-size="13" fill="#94a3b8">  Writing output...</text>
  <text x="68" y="262" font-family="'Courier New', monospace" font-size="13" fill="#4ade80">  ✓ Exported 1,247 records</text>
  <!-- Blinking cursor -->
  <rect x="68" y="287" width="9" height="16" fill="#4ade80" opacity="0.8"/>
  <!-- Python badge -->
  <rect x="620" y="340" width="110" height="34" rx="6" fill="#3776ab" opacity="0.9"/>
  <text x="675" y="362" font-family="sans-serif" font-size="13" font-weight="600" fill="white" text-anchor="middle">Python Tool</text>
</svg>
